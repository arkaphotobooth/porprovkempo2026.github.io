<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Broadcast - MASS KEMPO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111; color: #fff; overflow: hidden; }
        .font-display { font-family: 'Oswald', sans-serif; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative bg-[#111]">

    <div id="view-idle" class="absolute inset-0 z-50 flex flex-col items-center justify-center animate-pulse bg-black">
        <h1 class="text-3xl font-black text-slate-700 tracking-widest uppercase">TV Sutradara Offline</h1>
    </div>

    <div id="view-score" class="absolute inset-0 z-40 flex flex-col hidden bg-[#111] p-8 gap-6 font-sans text-white">
        
        <div class="flex-none">
            <h1 id="tv-global-judul" class="text-lg font-bold text-slate-400 tracking-widest uppercase mb-1">KEJUARAAN NASIONAL BELADIRI SENI 2024</h1>
            <h2 id="tv-score-kategori-head" class="text-4xl text-white font-light uppercase tracking-wide">-</h2>
        </div>

        <div class="flex justify-between items-stretch gap-6 flex-none h-[100px]">
            <div class="border border-[#444] flex items-center p-5 gap-6 min-w-[400px]">
                <div class="w-[80px] h-[55px] flex flex-col border border-slate-500 shadow-sm">
                    <div class="flex-1 bg-red-600"></div>
                    <div class="flex-1 bg-white"></div>
                </div>
                <div class="flex flex-col justify-center">
                    <span class="text-[11px] text-slate-400 font-bold uppercase tracking-widest mb-1">KONTINGEN :</span>
                    <span id="tv-score-kontingen" class="text-3xl font-black text-white uppercase tracking-wider leading-none">-</span>
                </div>
            </div>

            <div class="border border-[#444] flex items-center justify-center px-10 gap-6">
                <span id="tv-score-waktu" class="text-6xl font-bold tracking-wider font-mono">00:00</span>
                <i class="fas fa-stopwatch text-5xl text-slate-400"></i>
            </div>
        </div>

        <div class="flex gap-6 flex-grow min-h-0">
            <div class="border border-[#444] flex flex-col w-[35%]">
                <div class="border-b border-[#444] text-center py-2 text-sm font-bold tracking-widest text-slate-400">
                    ATLET
                </div>
                <div id="tv-score-name-container" class="flex-grow overflow-hidden p-6 flex flex-col gap-3">
                    </div>
            </div>

            <div class="border border-[#444] flex flex-col flex-1 relative items-center justify-center overflow-hidden" style="clip-path: polygon(0 0, 100% 0, 100% calc(100% - 50px), calc(100% - 50px) 100%, 0 100%);">
                <div class="text-4xl font-bold tracking-widest text-white z-10 mb-4 drop-shadow-md">NILAI AKHIR</div>
                <div id="tv-score-final" class="text-[16rem] font-black text-slate-700 leading-none z-10 drop-shadow-lg font-display">-</div>
            </div>
        </div>

        <div class="flex gap-6 flex-none h-[130px]">
            <div id="tv-score-wasit-container" class="flex flex-1 gap-6">
                </div>
            
            <div class="border border-[#444] flex flex-col w-[15%]">
                <div class="border-b border-[#444] text-center py-2 text-sm font-bold tracking-widest text-slate-400">DENDA</div>
                <div class="flex-grow flex items-center justify-center">
                    <span id="tv-score-denda" class="text-6xl font-black text-slate-700 font-display">-</span>
                </div>
            </div>
        </div>
    </div>

    <div id="view-randori" class="absolute inset-0 z-50 flex hidden bg-black">
        <div class="flex-1 bg-red-600 flex flex-col justify-between p-10 relative border-r-4 border-black">
             <div class="text-center bg-black/30 p-4 rounded-xl border border-red-500/50">
                 <div id="tv-randori-kategori" class="text-xl font-bold text-red-200 uppercase">-</div>
                 <div id="tv-randori-nama-merah" class="text-6xl font-black text-white">-</div>
                 <div id="tv-randori-kont-merah" class="text-2xl font-bold text-red-200">-</div>
             </div>
             <div class="flex-grow flex items-center justify-center">
                 <div id="tv-randori-skor-merah" class="text-[20rem] font-mono font-black text-white leading-none">0</div>
             </div>
        </div>
        <div class="absolute left-1/2 top-5 -translate-x-1/2 z-50 bg-[#111] px-10 py-4 rounded-3xl border border-[#444] shadow-2xl">
            <span id="tv-randori-waktu" class="text-6xl font-mono font-black text-white tracking-widest">00:00</span>
        </div>
        <div class="flex-1 bg-white flex flex-col justify-between p-10 relative border-l-4 border-black">
             <div class="text-center bg-slate-200 p-4 rounded-xl border border-slate-300">
                 <div class="text-xl font-bold text-slate-500 uppercase">PITA PUTIH</div>
                 <div id="tv-randori-nama-putih" class="text-6xl font-black text-slate-900">-</div>
                 <div id="tv-randori-kont-putih" class="text-2xl font-bold text-slate-500">-</div>
             </div>
             <div class="flex-grow flex items-center justify-center">
                 <div id="tv-randori-skor-putih" class="text-[20rem] font-mono font-black text-slate-900 leading-none">0</div>
             </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA63UtPlhEdC9qKmmHVpDjGv_4RqWjK47k",
            authDomain: "mass-pro-turnamen.firebaseapp.com",
            projectId: "mass-pro-turnamen",
            databaseURL: "https://mass-pro-turnamen-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "mass-pro-turnamen.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const courtId = urlParams.get('court') || 'court_1';

        const views = {
            idle: document.getElementById('view-idle'),
            score: document.getElementById('view-score'),
            randori: document.getElementById('view-randori')
        };

        function switchView(target) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            views[target].classList.remove('hidden');
        }

        // Sensor Judul TV Real-Time
        database.ref('turnamen_data/settings/judulTV').on('value', (snap) => {
            const judulEl = document.getElementById('tv-global-judul');
            if (judulEl) judulEl.innerText = snap.val() || "KEJUARAAN NASIONAL BELADIRI SENI 2024";
        });

        let displayTimer = null; 
        let savedPreviewData = null; 

        // Fungsi khusus merender tampilan kosong (Standby)
        function renderEmptyScoreLayout(previewData) {
            if(!previewData) return;
            document.getElementById('tv-score-kategori-head').innerText = previewData.kategori;
            document.getElementById('tv-score-waktu').innerText = '00:00';
            document.getElementById('tv-score-kontingen').innerText = previewData.kontingen;

            // Warnakan Denda & Skor Akhir menjadi Abu-abu (Tanda Kosong)
            let finalEl = document.getElementById('tv-score-final');
            finalEl.innerText = "-";
            finalEl.className = "text-[16rem] font-black text-slate-700 leading-none z-10 drop-shadow-lg font-display";

            let dendaEl = document.getElementById('tv-score-denda');
            dendaEl.innerText = "-";
            dendaEl.className = "text-6xl font-black text-slate-700 font-display";

            // Mapping Nama
            let names = previewData.nama.split('&').map(n => n.trim());
            let nameHTML = '';
            names.forEach((n, idx) => {
                nameHTML += `
                <div class="flex items-center text-2xl text-white font-light border-b border-[#333] pb-2">
                    <span class="w-12 text-left text-slate-500 font-mono tracking-widest">${idx+1}.</span>
                    <span class="truncate tracking-wide">${n}</span>
                </div>`;
            });
            document.getElementById('tv-score-name-container').innerHTML = nameHTML;

            // Mapping Wasit Kosong (Strip Abu-abu)
            let wasitHTML = '';
            for(let i=0; i<5; i++) {
                wasitHTML += `
                <div class="border border-[#444] flex-1 flex flex-col text-center bg-black/10">
                    <div class="border-b border-[#444] py-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                        WASIT ${i+1}
                    </div>
                    <div class="flex-grow flex items-center justify-center">
                        <span class="text-6xl font-black text-slate-700 font-display leading-none">-</span>
                    </div>
                </div>`;
            }
            document.getElementById('tv-score-wasit-container').innerHTML = wasitHTML;
            switchView('score');
        }

        database.ref(`live_broadcast/${courtId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (!data || data.current_action === 'idle') {
                switchView('idle');
                return;
            }

            if (data.type === 'randori') {
                if(displayTimer) { clearTimeout(displayTimer); displayTimer = null; }
                switchView('randori');
                document.getElementById('tv-randori-kategori').innerText = data.kategori || "-";
                document.getElementById('tv-randori-waktu').innerText = data.waktu || "00:00";
                document.getElementById('tv-randori-nama-merah').innerText = data.merah.nama || "-";
                document.getElementById('tv-randori-kont-merah').innerText = data.merah.kontingen || "-";
                document.getElementById('tv-randori-skor-merah').innerText = data.merah.skor || "0";
                document.getElementById('tv-randori-nama-putih').innerText = data.putih.nama || "-";
                document.getElementById('tv-randori-kont-putih').innerText = data.putih.kontingen || "-";
                document.getElementById('tv-randori-skor-putih').innerText = data.putih.skor || "0";
                return;
            }

            if (data.preview_data) savedPreviewData = data.preview_data;

            if (data.current_action === 'show_score' && data.score_data) {
                if(displayTimer) clearTimeout(displayTimer);
                
                const sData = data.score_data;
                document.getElementById('tv-score-kategori-head').innerText = sData.kategori;
                document.getElementById('tv-score-waktu').innerText = sData.waktu;
                document.getElementById('tv-score-kontingen').innerText = sData.kontingen;
                
                // Warnakan Denda (Merah) & Skor Akhir (Emas) karena sudah berisi nilai
                let finalEl = document.getElementById('tv-score-final');
                finalEl.innerText = sData.nilaiAkhir;
                finalEl.className = "text-[16rem] font-black text-[#cca650] leading-none z-10 drop-shadow-lg font-display";

                let dendaEl = document.getElementById('tv-score-denda');
                dendaEl.innerText = sData.denda > 0 ? `-${sData.denda}` : '0';
                dendaEl.className = "text-6xl font-black text-red-500 font-display";

                // Mapping Nama
                let names = sData.nama.split('&').map(n => n.trim());
                let nameHTML = '';
                names.forEach((n, idx) => {
                    nameHTML += `
                    <div class="flex items-center text-2xl text-white font-light border-b border-[#333] pb-2">
                        <span class="w-12 text-left text-slate-500 font-mono tracking-widest">${idx+1}.</span>
                        <span class="truncate tracking-wide">${n}</span>
                    </div>`;
                });
                document.getElementById('tv-score-name-container').innerHTML = nameHTML;

                // Mapping Wasit Berisi Nilai (Putih)
                let wasitHTML = '';
                let rawScores = sData.rawScores || [];
                while(rawScores.length < 5) rawScores.push('-');
                
                rawScores.forEach((score, i) => {
                    wasitHTML += `
                    <div class="border border-[#444] flex-1 flex flex-col text-center bg-black/10">
                        <div class="border-b border-[#444] py-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                            WASIT ${i+1}
                        </div>
                        <div class="flex-grow flex items-center justify-center">
                            <span class="text-6xl font-black text-white font-display leading-none">${score > 0 ? parseFloat(score).toFixed(2) : '-'}</span>
                        </div>
                    </div>`;
                });
                document.getElementById('tv-score-wasit-container').innerHTML = wasitHTML;
                switchView('score');

                // Timer 10 Detik: Kembali ke layou Kosong (Standby)
                displayTimer = setTimeout(() => {
                    if (savedPreviewData) {
                        renderEmptyScoreLayout(savedPreviewData);
                    }
                    displayTimer = null; 
                }, 10000); 
            } 
            else if (data.current_action === 'preview' && !displayTimer) {
                // Tampilkan Layout Kosong (Standby) secara instan
                renderEmptyScoreLayout(data.preview_data);
            }
        });
    </script>
</body>
</html>
